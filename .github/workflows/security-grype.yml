name: Security Scan (Grype)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  grype:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reuse image from registry when available
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/mymedialibrary/mymedialibrary"
          CANDIDATES=(
            "${IMAGE_REPO}:${GITHUB_SHA}"
            "${IMAGE_REPO}:${GITHUB_REF_NAME}"
            "${IMAGE_REPO}:latest"
          )

          for candidate in "${CANDIDATES[@]}"; do
            if docker pull "$candidate"; then
              docker tag "$candidate" mymedialibrary:ci-scan
              echo "source=reused" >> "$GITHUB_OUTPUT"
              echo "image_ref=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "source=build" >> "$GITHUB_OUTPUT"

      - name: Build fallback image
        if: steps.image.outputs.source == 'build'
        run: docker build -t mymedialibrary:ci-scan -f docker/Dockerfile .

      - name: Scan image with Grype (HIGH/CRITICAL)
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: mymedialibrary:ci-scan
          output-format: sarif
          output-file: grype-image.sarif
          severity-cutoff: high
          fail-build: false

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@35632bdbd38dba649ce80e15482f7a399a32d400 # v3.27.9
        with:
          sarif_file: grype-image.sarif
          category: grype-image

      - name: Upload Grype artifacts
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: grype-reports
          path: grype-image.sarif
