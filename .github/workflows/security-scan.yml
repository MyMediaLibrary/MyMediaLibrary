name: Security Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: mymedialibrary:ci-scan

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reuse image from registry when available
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/mymedialibrary/mymedialibrary"
          CANDIDATES=(
            "${IMAGE_REPO}:${GITHUB_SHA}"
            "${IMAGE_REPO}:${GITHUB_REF_NAME}"
            "${IMAGE_REPO}:latest"
          )

          for candidate in "${CANDIDATES[@]}"; do
            if docker pull "$candidate"; then
              docker tag "$candidate" "$IMAGE_NAME"
              echo "source=reused" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "source=build" >> "$GITHUB_OUTPUT"

      - name: Build fallback image
        if: steps.image.outputs.source == 'build'
        run: docker build -t "$IMAGE_NAME" -f docker/Dockerfile .

      - name: Trivy (HIGH/CRITICAL check, non-blocking)
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.53.0 image "$IMAGE_NAME" \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --no-progress

      - name: Trivy (full report)
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.53.0 image "$IMAGE_NAME" \
            --no-progress \
            --format table \
            -o /workspace/trivy-full.txt

          docker run --rm \
            -v "$PWD:/workspace" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.53.0 image "$IMAGE_NAME" \
            --no-progress \
            --format json \
            -o /workspace/trivy-full.json

      - name: Grype (HIGH/CRITICAL check, non-blocking)
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/grype:v0.79.3 "$IMAGE_NAME" \
            --fail-on high || true

      - name: Grype (full report)
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/grype:v0.79.3 "$IMAGE_NAME" -o table > grype-full.txt || true
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/grype:v0.79.3 "$IMAGE_NAME" -o json > grype-full.json || true

      - name: Ensure report files exist
        if: always()
        run: |
          [ -f trivy-full.txt ] || : > trivy-full.txt
          [ -f grype-full.txt ] || : > grype-full.txt
          [ -f trivy-full.json ] || echo '{"Results":[]}' > trivy-full.json
          [ -f grype-full.json ] || echo '{"matches":[]}' > grype-full.json

      - name: Security summary
        if: always()
        run: |
          echo "===== SECURITY SUMMARY ====="

          echo ""
          echo "TRIVY:"
          jq -r '
            [
              .Results[].Vulnerabilities[]?
            ] | group_by(.Severity) |
            map({severity: .[0].Severity, count: length}) |
            .[] | "- \(.severity): \(.count)"
          ' trivy-full.json

          echo ""
          echo "GRYPE:"
          jq -r '
            .matches
            | group_by(.vulnerability.severity)
            | map({severity: .[0].vulnerability.severity, count: length})
            | .[] | "- \(.severity): \(.count)"
          ' grype-full.json

          echo ""
          echo "TOP CVE (CRITICAL/HIGH):"

          echo ""
          echo "Trivy:"
          jq -r '
            [.Results[].Vulnerabilities[]?
              | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(.Severity)
            | reverse
            | .[:10]
            | .[]
            | "- \(.VulnerabilityID) (\(.Severity))"
          ' trivy-full.json

          echo ""
          echo "Grype:"
          jq -r '
            [.matches[]
              | select(.vulnerability.severity=="Critical" or .vulnerability.severity=="High")]
            | .[:10]
            | .[]
            | "- \(.vulnerability.id) (\(.vulnerability.severity))"
          ' grype-full.json

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-full.txt
            trivy-full.json
            grype-full.txt
            grype-full.json
