name: Security Scan (Trivy)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reuse image from registry when available
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/mymedialibrary/mymedialibrary"
          CANDIDATES=(
            "${IMAGE_REPO}:${GITHUB_SHA}"
            "${IMAGE_REPO}:${GITHUB_REF_NAME}"
            "${IMAGE_REPO}:latest"
          )

          for candidate in "${CANDIDATES[@]}"; do
            if docker pull "$candidate"; then
              docker tag "$candidate" mymedialibrary:ci-scan
              echo "source=reused" >> "$GITHUB_OUTPUT"
              echo "image_ref=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "source=build" >> "$GITHUB_OUTPUT"

      - name: Build fallback image
        if: steps.image.outputs.source == 'build'
        run: docker build -t mymedialibrary:ci-scan -f docker/Dockerfile .

      - name: Trivy scan (repository)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: image
          image-ref: mymedialibrary:ci-scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload SARIF (repo)
        if: always()
        uses: github/codeql-action/upload-sarif@35632bdbd38dba649ce80e15482f7a399a32d400 # v3.27.9
        with:
          sarif_file: trivy-repo.sarif
          category: trivy-repo

      - name: Upload SARIF (image)
        if: always()
        uses: github/codeql-action/upload-sarif@35632bdbd38dba649ce80e15482f7a399a32d400 # v3.27.9
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
