name: Test Suite

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Python unit/integration tests
        run: python3 -m unittest discover -s tests/python -p 'test_*.py'
      - name: Run legacy Python tests
        run: python3 -m unittest discover -s conf/tests -p 'test_*.py'

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run frontend unit tests
        run: npm run test:frontend:unit

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run critical E2E tests
        run: npm run test:frontend:e2e
