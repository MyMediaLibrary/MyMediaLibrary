services:
  mymedialibrary:
    image: ghcr.io/mymedialibrary/mymedialibrary:latest
    container_name: mymedialibrary
    ports:
      - "8094:80"
    volumes:
      - ./data:/data                              # config.json, library.json, scanner.log
      - /chemin/vers/ta/mediatheque:/library:ro   # adapter ce chemin à ta médiathèque
    environment:
      LIBRARY_PATH: /library   # fixé à /library dans le conteneur — adapter le volume ci-dessus
      # APP_PASSWORD: ""
    restart: unless-stopped
