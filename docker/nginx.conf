worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Disable merging of double slashes (needed for paths with special chars)
        merge_slashes off;

        # Security headers
        add_header X-Frame-Options          "DENY"                             always;
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        # CSP: inline scripts/styles needed by current app architecture;
        # frame-ancestors replaces X-Frame-Options for CSP2+ browsers.
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        location = /library.json {
            alias /data/library.json;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Access-Control-Allow-Origin "*";
        }

        # Local poster images — served from media library
        # $request_uri used instead of $uri to preserve encoded chars (%23=#, %25=%, etc.)
        location /posters/ {
            # Strip /posters/ prefix and serve from library root
            rewrite ^/posters/(.*)$ /$1 break;
            root ${LIBRARY_PATH};
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location = /health {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # Auth endpoint (password check for frontend overlay)
        location /api/auth {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host $host;
        }

        # Proxy scan API to internal scanner.py --serve
        location /api/scan {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host $host;
            proxy_read_timeout 600s;
        }

        # Proxy config API
        location /api/config {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host $host;
        }

        # Proxy providers map API
        location /api/providers-map {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host $host;
        }

        # Proxy Jellyseerr API (test connection, etc.)
        location /api/jellyseerr {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host $host;
        }

        # Serve markdown docs as plain text (readable in browser)
        location /docs/ {
            add_header Content-Type "text/plain; charset=utf-8";
            try_files $uri =404;
        }

        # Block access to hidden/secret files (defense in depth)
        location ~ /\. {
            deny all;
            return 404;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
