worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Disable merging of double slashes (needed for paths with special chars)
        merge_slashes off;

        # Security headers
        add_header X-Frame-Options          "DENY"                             always;
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        # CSP: inline scripts/styles needed by current app architecture;
        # frame-ancestors replaces X-Frame-Options for CSP2+ browsers.
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        location = /library.json {
            auth_request /api/auth/validate;
            error_page 401 = @auth_error;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            return 410 '{"error":"library_json_removed","replacement":"/api/library"}';
        }

        # docs.html: block direct access server-side; redirect to login on 401
        location = /docs.html {
            auth_request /api/auth/validate;
            error_page 401 = @auth_redirect;
        }

        # Local poster images — served from media library, requires auth when enabled.
        # $request_uri used instead of $uri to preserve encoded chars (%23=#, %25=%, etc.)
        location /posters/ {
            auth_request /api/auth/validate;
            error_page 401 = @auth_error;
            # Strip /posters/ prefix and serve from library root
            rewrite ^/posters/(.*)$ /$1 break;
            root /library;
            expires 7d;
            add_header Cache-Control "private";
        }

        # Health check endpoint
        location = /health {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # Auth endpoint (password check for frontend overlay)
        location /api/auth {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Logout endpoint (session invalidation)
        location /api/logout {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy scan API to internal scanner.py --serve
        location /api/scan {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        # Proxy config API
        location /api/config {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy score settings API
        location /api/settings {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy providers map API
        location /api/providers-map {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy providers logo API
        location /api/providers-logo {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/audio-languages {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/audiocodec-mapping {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy SQLite-backed library API
        location /api/library {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy recommendations API
        location /api/recommendations {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Proxy Seerr API (test connection, etc.) + legacy Jellyseerr path
        location ~ ^/api/(seerr|jellyseerr) {
            proxy_pass         http://127.0.0.1:8095;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Serve markdown docs as plain text (readable in browser)
        location /docs/ {
            add_header Content-Type "text/plain; charset=utf-8";
            try_files $uri =404;
        }

        # Block access to hidden/secret files (defense in depth)
        location ~ /\. {
            deny all;
            return 404;
        }

        # Runtime storage is never served by nginx.
        location ~ ^/(data|conf)(/|$) {
            deny all;
            return 404;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        # Auth-request named error handlers
        # For JSON/API resources: return 401 (fetch interceptor shows login overlay)
        location @auth_error {
            add_header Content-Type "application/json" always;
            return 401 '{"error":"unauthorized"}';
        }
        # For HTML pages: redirect to home (login overlay shown by index.html).
        # Use $http_host (includes port) so the redirect works behind a non-standard port.
        location @auth_redirect {
            return 302 $scheme://$http_host/;
        }
    }
}
